        function refresh() {
            if (window.hasOwnProperty('calculatedFields')) {
                calculatedFields.forEach(function (obj) {
                    obj.executeAll();
                });
            }
        }

        $(".formset").formset({
            animateForms: true
        });

        $(".formset").on('formAdded', function (e) {
            if (window.hasOwnProperty('calculatedFields')) {
                resetCalculatedFields();
            }
        });

        $(".formset").on('formDeleted', function (e) {
            refresh();
        });

        refresh();
    });
